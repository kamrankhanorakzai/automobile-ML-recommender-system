name: CI/CD Pipeline - DVC Build, Docker Push & Hugging Face Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: automobile-ml-recommender

jobs:

  # ─────────────────────────────────────────────
  # STAGE 1: DVC Pipeline
  # ─────────────────────────────────────────────
  dvc-pipeline:
    name: DVC - Pull Data & Reproduce Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc

      - name: Run DVC pipeline
        run: |
          dvc dag

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dvc-artifacts
          path: |
            data/processed/
            data/interim/

  # ─────────────────────────────────────────────
  # STAGE 2: Docker Build (optional Docker Hub)
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: dvc-pipeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dvc-artifacts
          path: ./

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # OPTIONAL Docker Hub login (remove if not needed)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}

  # ─────────────────────────────────────────────
  # STAGE 3: Deploy to Hugging Face Spaces
  # ─────────────────────────────────────────────
  hf-deploy:
    name: Deploy to Hugging Face
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install HF CLI
        run: pip install huggingface_hub

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://huggingface.co/spaces/kami2334/car_recommender hf_space
          rsync -av --exclude='.git' ./ hf_space/
          cd hf_space
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add .
          git commit -m "Auto deploy from GitHub CI/CD"
          git push https://kami2334:$HF_TOKEN@huggingface.co/spaces/kami2334/car_recommender main